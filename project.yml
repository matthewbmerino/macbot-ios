name: iPhoneBot
options:
  bundleIdPrefix: com.matthewbmerino
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
  swift-llama-cpp:
    url: https://github.com/pgorzelany/swift-llama-cpp
    from: "1.0.0"

targets:
  iPhoneBot:
    type: application
    platform: iOS
    sources:
      - MacbotMobile
    dependencies:
      - package: GRDB
        product: GRDB
      - package: KeychainAccess
      - package: swift-llama-cpp
        product: SwiftLlama
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matthewbmerino.iphonebot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_VALUES: |
          CFBundleName=$(PRODUCT_NAME)
          CFBundleDisplayName=iPhoneBot
          UILaunchScreen={}
          NSLocalNetworkUsageDescription=Connects to your local Ollama AI server.
        DEVELOPMENT_TEAM: 2YPRK37S5Y
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_OBJC_INTEROP_MODE: objcxx
