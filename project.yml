name: iPhoneBot
options:
  bundleIdPrefix: com.matthewbmerino
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"

targets:
  iPhoneBot:
    type: application
    platform: iOS
    sources:
      - MacbotMobile
    dependencies:
      - package: GRDB
        product: GRDB
      - package: KeychainAccess
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matthewbmerino.iphonebot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_VALUES: |
          CFBundleName=$(PRODUCT_NAME)
          CFBundleDisplayName=iPhoneBot
          UILaunchScreen={}
          NSLocalNetworkUsageDescription=Connects to your local Ollama AI server.
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.10"
